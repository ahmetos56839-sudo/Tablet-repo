<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalori Takip</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: white; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body class="p-6">
    <div class="max-w-md mx-auto">
        <header class="mb-8 text-center">
            <h1 class="text-3xl font-bold text-blue-400">Kalori Takip</h1>
            <p class="text-slate-400">Bugün ne yedin Ahmet?</p>
        </header>

        <div class="glass rounded-3xl p-6 text-center mb-8">
            <div class="text-5xl font-black text-white" id="total-calories">0</div>
            <div class="text-sm text-slate-400 mt-2 uppercase tracking-widest">Toplam Kalori</div>
        </div>

        <div class="glass rounded-2xl p-4 mb-8">
            <div class="flex gap-2">
                <input type="text" id="food-name" placeholder="Yemek adı..." class="bg-transparent border-b border-slate-600 focus:border-blue-400 outline-none p-2 flex-1 text-sm">
                <input type="number" id="calorie-amount" placeholder="kcal" class="bg-transparent border-b border-slate-600 focus:border-blue-400 outline-none p-2 w-20 text-sm text-center">
                <button onclick="addEntry()" class="bg-blue-500 hover:bg-blue-600 p-2 rounded-xl transition">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" /></svg>
                </button>
            </div>
        </div>

        <div id="entry-list" class="space-y-3">
            </div>
        
        <button onclick="resetDaily()" class="w-full mt-10 text-slate-500 text-xs underline">Günü Sıfırla</button>
    </div>

    <script>
        // JavaScript buraya gelecek
    </script>
</body>
</html>
