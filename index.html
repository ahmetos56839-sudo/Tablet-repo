<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Kalori</title> 

    <link rel="icon" href="logo.png" type="image/png">
    
    <link rel="apple-touch-icon" href="logo.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalori Takip</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: white; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        .animate-fade-in { animation: fadeIn 0.3s ease-in; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-md mx-auto">
        <header class="mb-6 text-center">
            <h1 class="text-3xl font-bold text-blue-400 tracking-tight">Kalori Takip</h1>
            <p class="text-slate-400 text-sm">ESOGÜ Yazılım Günlüğü 🚀</p>
        </header>

        <div class="glass rounded-3xl p-8 text-center mb-6 shadow-2xl">
            <div class="text-6xl font-black text-white" id="total-calories">0</div>
            <div class="text-xs text-slate-400 mt-2 uppercase tracking-[0.2em]">Toplam kcal</div>
        </div>

        <div class="glass rounded-2xl p-4 mb-6">
            <div class="flex flex-col gap-3">
                <input type="text" id="food-name" placeholder="Ne yedin?" class="bg-slate-800/50 rounded-xl border border-slate-700 focus:border-blue-400 outline-none p-3 text-sm transition-all">
                <div class="flex gap-2">
                    <input type="number" id="calorie-amount" placeholder="Kalori" class="bg-slate-800/50 rounded-xl border border-slate-700 focus:border-blue-400 outline-none p-3 flex-1 text-sm text-center">
                    <button onclick="addEntry()" class="bg-blue-500 hover:bg-blue-600 px-6 rounded-xl transition-all shadow-lg active:scale-95 font-bold">
                        Ekle
                    </button>
                </div>
            </div>
        </div>

        <div id="entry-list" class="space-y-3 max-h-[40vh] overflow-y-auto pr-1">
            </div>
        
        <button onclick="resetDaily()" class="w-full mt-8 text-slate-500 text-xs hover:text-red-400 transition-colors uppercase tracking-widest font-semibold">
            Günü Sıfırla
        </button>
    </div>

    <script>
        // Verileri Tarayıcı Hafızasından Al (Local Storage)
        let entries = JSON.parse(localStorage.getItem('ahmet_calories')) || [];

        function updateUI() {
            const list = document.getElementById('entry-list');
            const totalEl = document.getElementById('total-calories');
            list.innerHTML = '';
            let total = 0;

            entries.forEach((entry, index) => {
                total += parseInt(entry.kcal);
                list.innerHTML += `
                    <div class="glass p-4 rounded-xl flex justify-between items-center animate-fade-in border-l-4 border-blue-500">
                        <div>
                            <div class="font-bold text-slate-200">${entry.name}</div>
                            <div class="text-[10px] text-slate-500 uppercase">${entry.time}</div>
                        </div>
                        <div class="flex items-center gap-3">
                            <span class="text-blue-400 font-black">${entry.kcal} <small class="text-[10px]">kcal</small></span>
                            <button onclick="deleteEntry(${index})" class="p-2 hover:bg-red-500/20 rounded-lg transition-colors group">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-slate-600 group-hover:text-red-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                                </svg>
                            </button>
                        </div>
                    </div>`;
            });

            totalEl.innerText = total;
            localStorage.setItem('ahmet_calories', JSON.stringify(entries));
        }

        function addEntry() {
            const nameInput = document.getElementById('food-name');
            const kcalInput = document.getElementById('calorie-amount');
            
            if(nameInput.value && kcalInput.value) {
                const now = new Date();
                const time = now.toLocaleTimeString('tr-TR', { hour: '2-digit', minute: '2-digit' });
                entries.unshift({ name: nameInput.value, kcal: kcalInput.value, time });
                
                nameInput.value = '';
                kcalInput.value = '';
                updateUI();
            }
        }

        function deleteEntry(index) {
            entries.splice(index, 1);
            updateUI();
        }

        function resetDaily() {
            if(confirm('Tüm kayıtlar silinecek. Yeni bir güne hazır mısın?')) {
                entries = [];
                updateUI();
            }
        }

        // İlk açılışta verileri yükle
        updateUI();
    </script>
</body>
</html>
